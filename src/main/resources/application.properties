# AutoFix X - Backend Configuration
spring.application.name=autofix-backend
server.port=8080
server.servlet.context-path=/api

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/autofix_db
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# JWT Configuration
jwt.secret=your-secret-key-change-this-in-production-make-it-longer-and-more-secure-key-here
jwt.expiration=86400000

# WebSocket Configuration
server.servlet.websocket.max-text-message-size=100000

# Stripe Configuration (Get keys from https://dashboard.stripe.com/test/keys)
stripe.api.key=${STRIPE_API_KEY:}

# Twilio Configuration (Get from https://www.twilio.com/console)
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.phone-number=${TWILIO_PHONE_NUMBER:}

# Logging
logging.level.root=INFO
logging.level.com.autofix=DEBUG
logging.level.org.hibernate=DEBUG

# Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# Redis (optional)
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=60000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true
